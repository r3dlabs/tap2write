<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Patient Assistant</title>
    <style>
        :root {
            --bg: #e0e0e0;
            --txt: #000000;
            --btn: #ffffff;
            --brdr: #999;
        }

        [data-theme="dark"] {
            --bg: #000000;
            --txt: #fdfd96; 
            --btn: #1a1a1a;
            --brdr: #444;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            background-color: var(--bg); color: var(--txt);
            font-family: sans-serif; overflow: hidden;
            display: flex; flex-direction: column;
        }

        /* Full Screen Bar */
        #fs-bar { height: 4vh; background: #222; display: flex; flex-shrink: 0; }
        #fs-bar button { flex: 1; background: none; color: #ccc; border: none; font-size: 0.8rem; cursor: pointer; }

        /* Display Box - Flexible but keeps its ratio */
        #display-box {
            height: 20vh;
            display: flex; align-items: center; justify-content: center;
            border-bottom: 4px solid var(--brdr);
            padding: 10px;
            font-size: clamp(2.5rem, 8vw, 6rem); /* Responsive font sizing */
            font-weight: 900;
            text-align: center; 
            word-break: break-word;
            background: var(--bg);
            flex-shrink: 0;
        }

        /* Navigation Bar */
        .nav-bar { display: flex; height: 10vh; flex-shrink: 0; }
        .nav-btn {
            flex: 1; font-size: clamp(1rem, 4vw, 1.8rem); font-weight: bold;
            background: var(--btn); color: var(--txt);
            border: 1px solid var(--brdr); cursor: pointer;
        }
        .active-tab { background-color: var(--txt) !important; color: var(--bg) !important; }

        /* Main Screen Container */
        .screen { 
            display: none; 
            height: 66vh; /* Remaining height */
            padding: 10px; 
            box-sizing: border-box; 
        }
        .active-screen { display: block; }

        /* Phrase Layout */
        #phrase-grid { 
            display: grid;
            grid-template-columns: repeat(2, 1fr); 
            grid-template-rows: repeat(3, 1fr); 
            gap: 10px;
            height: 100%;
        }

        /* Keyboard Layout - 7 columns wide */
        #keyboard-grid { 
            display: grid;
            grid-template-columns: repeat(7, 1fr); 
            grid-template-rows: repeat(5, 1fr);
            gap: 6px;
            height: 100%;
        }

        /* Responsive Tiles */
        .tile {
            background: var(--btn); color: var(--txt);
            border: 3px solid var(--brdr); border-radius: 8px;
            font-size: clamp(1.2rem, 5vw, 2.8rem); 
            font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .tile:active { background-color: var(--txt); color: var(--bg); }

        /* Special Keys */
        .tile.special { background-color: #555; color: white; }
        .tile.del { background-color: #aa4444; color: white; }
        .tile.wide { grid-column: span 3; }
        .tile.med { grid-column: span 2; }

        /* Adjustments for Portrait/Narrow Screens */
        @media (max-width: 600px) {
            #keyboard-grid { grid-template-columns: repeat(5, 1fr); grid-template-rows: auto; }
            .tile.wide { grid-column: span 2; }
            .tile { font-size: 1.5rem; border-width: 2px; }
        }
    </style>
</head>
<body data-theme="dark">

    <div id="fs-bar"><button onclick="goFull()">⛶ FULL SCREEN MODE</button></div>

    <div id="display-box">READY</div>

    <div class="nav-bar">
        <button id="btn-phrases" class="nav-btn active-tab" onclick="showScreen('phrases')">PHRASES</button>
        <button id="btn-write" class="nav-btn" onclick="showScreen('write')">WRITE</button>
        <button class="nav-btn" onclick="toggleTheme()">☀️/🌙</button>
    </div>

    <div id="phrase-screen" class="screen active-screen">
        <div id="phrase-grid">
            <div class="tile" onclick="tapText('THIRSTY')">THIRSTY 💧</div>
            <div class="tile" onclick="tapText('HUNGRY')">HUNGRY 🍎</div>
            <div class="tile" onclick="tapText('TOILET')">TOILET 🚽</div>
            <div class="tile" style="border-color:red" onclick="tapText('PAIN')">PAIN 🚨</div>
            <div class="tile" onclick="tapText('YES')">YES ✅</div>
            <div class="tile" onclick="tapText('NO')">NO ❌</div>
        </div>
    </div>

    <div id="write-screen" class="screen">
        <div id="keyboard-grid"></div>
    </div>

    <script>
        const display = document.getElementById('display-box');
        let currentString = "";

        // Build Responsive Keyboard
        const kb = document.getElementById('keyboard-grid');
        const layout = "ABCDEFGHIJKLMNOPQRSTUVWXYZ".split("");

        layout.forEach(char => {
            const el = document.createElement('div');
            el.className = 'tile';
            el.innerText = char;
            el.onclick = () => addChar(char);
            kb.appendChild(el);
        });

        function createBtn(label, classes, action) {
            const btn = document.createElement('div');
            btn.className = 'tile ' + classes;
            btn.innerText = label;
            btn.onclick = action;
            kb.appendChild(btn);
        }

        createBtn('DEL', 'del', deleteChar);
        createBtn('SPACE', 'special wide', addSpace);
        createBtn('CLR', 'special', clearAll);

        // Core Functions
        function tapText(txt) {
            currentString = txt;
            display.innerText = txt;
        }

        function addChar(c) {
            if (display.innerText === "READY") currentString = "";
            currentString += c;
            display.innerText = currentString;
        }

        function addSpace() {
            currentString += " ";
            display.innerText = currentString;
        }

        function deleteChar() {
            currentString = currentString.slice(0, -1);
            display.innerText = currentString || "READY";
        }

        function clearAll() {
            currentString = "";
            display.innerText = "READY";
        }

        function showScreen(mode) {
            const p = document.getElementById('phrase-screen');
            const w = document.getElementById('write-screen');
            const bP = document.getElementById('btn-phrases');
            const bW = document.getElementById('btn-write');

            if (mode === 'phrases') {
                p.classList.add('active-screen');
                w.classList.remove('active-screen');
                bP.classList.add('active-tab');
                bW.classList.remove('active-tab');
            } else {
                w.classList.add('active-screen');
                p.classList.remove('active-screen');
                bW.classList.add('active-tab');
                bP.classList.remove('active-tab');
            }
        }

        function toggleTheme() {
            document.body.hasAttribute('data-theme') ? document.body.removeAttribute('data-theme') : document.body.setAttribute('data-theme', 'dark');
        }

        function goFull() {
            const doc = document.documentElement;
            if (doc.requestFullscreen) doc.requestFullscreen();
            else if (doc.webkitRequestFullscreen) doc.webkitRequestFullscreen();
            else if (doc.msRequestFullscreen) doc.msRequestFullscreen();
        }
    </script>
</body>
</html>
